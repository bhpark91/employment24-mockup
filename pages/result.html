<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>육아휴직 급여 신청 체험 결과</title>
<link rel="stylesheet" href="../assets/css/font.css">
<link rel="stylesheet" href="../assets/css/mockup.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Pretendard GOV Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    background: #f8fafc;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .result-container {
    max-width: 720px;
    width: 100%;
    text-align: center;
  }

  .result-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: #10b981;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: #fff;
  }

  .result-heading {
    font-size: 32px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .result-subheading {
    font-size: 18px;
    color: #6b7280;
    margin-bottom: 48px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px 32px;
    margin-bottom: 32px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0;
    border-bottom: 1px solid #f3f4f6;
  }

  .stat-row:last-child {
    border-bottom: none;
  }

  .stat-label {
    font-size: 16px;
    color: #4b5563;
    text-align: left;
    flex: 1;
  }

  .stat-value {
    font-size: 48px;
    font-weight: 800;
    color: #1a56db;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 200px;
  }

  .stat-value.red {
    color: #dc2626;
  }

  .stat-value.green {
    color: #059669;
  }

  .stat-value .unit {
    font-size: 24px;
    font-weight: 600;
  }

  .highlight-card {
    background: linear-gradient(135deg, #fef2f2 0%, #fff7ed 100%);
    border: 2px solid #fca5a5;
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
    text-align: center;
  }

  .highlight-card .emphasis {
    font-size: 22px;
    font-weight: 700;
    color: #dc2626;
    margin-bottom: 8px;
  }

  .highlight-card .detail {
    font-size: 16px;
    color: #92400e;
    line-height: 1.6;
  }

  .comparison {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
  }

  .comparison-box {
    flex: 1;
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
  }

  .comparison-box.before {
    background: #fef2f2;
    border: 1px solid #fecaca;
  }

  .comparison-box.after {
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
  }

  .comparison-box .comp-label {
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .comparison-box .comp-times {
    font-size: 40px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .comparison-box.before .comp-times {
    color: #dc2626;
  }

  .comparison-box.after .comp-times {
    color: #059669;
  }

  .comparison-box .comp-desc {
    font-size: 14px;
    color: #6b7280;
  }

  .arrow-between {
    display: flex;
    align-items: center;
    font-size: 28px;
    color: #9ca3af;
  }

  .btn-restart {
    display: inline-block;
    background: #1a56db;
    color: #fff;
    border: none;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
    margin-top: 8px;
  }

  .btn-restart:hover {
    background: #1648b8;
  }

  .footer-note {
    margin-top: 40px;
    font-size: 13px;
    color: #9ca3af;
  }
</style>
</head>
<body>

<div class="result-container">
  <div class="result-icon">&#10003;</div>
  <h1 class="result-heading">육아휴직 급여 신청 체험이<br>완료되었습니다</h1>
  <p class="result-subheading">소요 시간을 측정하였습니다</p>

  <!-- Main stats card -->
  <div class="card">
    <div class="stat-row">
      <span class="stat-label">1회 신청 소요 시간</span>
      <span class="stat-value" id="time-once">-</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">예상 연간 총 소요 시간<br><small style="color:#9ca3af">매월 1회 x 12개월</small></span>
      <span class="stat-value red" id="time-total">-</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">1회 신청으로 개선 시<br><small style="color:#9ca3af">절약되는 시간 (x11)</small></span>
      <span class="stat-value green" id="time-saved">-</span>
    </div>
  </div>

  <!-- Highlight message -->
  <div class="highlight-card">
    <p class="emphasis">이 절차를 매달 1회, 12개월간 반복해야 합니다</p>
    <p class="detail">현행 제도에서는 육아휴직 급여를 매월 신청해야 하며,<br>동일한 절차를 최대 12번 반복해야 합니다.</p>
  </div>

  <!-- Visual comparison -->
  <div class="comparison">
    <div class="comparison-box before">
      <div class="comp-label">현행</div>
      <div class="comp-times">12<span style="font-size:20px;font-weight:600">회</span></div>
      <div class="comp-desc">매월 반복 신청</div>
    </div>
    <div class="arrow-between">&#10132;</div>
    <div class="comparison-box after">
      <div class="comp-label">개선 시</div>
      <div class="comp-times">1<span style="font-size:20px;font-weight:600">회</span></div>
      <div class="comp-desc">최초 1회 신청</div>
    </div>
  </div>

  <button class="btn-restart" onclick="Mockup.Timer.reset(); window.location.href='step1-home.html'">다시 체험하기</button>

  <p class="footer-note">본 체험은 육아휴직 급여 신청 절차의 복잡성을 체감하기 위한 목적으로 제작되었습니다.</p>
</div>

<script src="../assets/js/mockup.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var elapsed = Mockup.Timer.getStoredElapsed();
  if (!elapsed || elapsed <= 0) elapsed = 300000; // fallback 5min

  var totalSec = Math.floor(elapsed / 1000);
  var min = Math.floor(totalSec / 60);
  var sec = totalSec % 60;

  // Format 1회 소요 시간
  document.getElementById('time-once').textContent = min + '분 ' + sec + '초';

  // 연간 총 소요 시간 (x12)
  var total12 = elapsed * 12;
  var total12Min = Math.floor(total12 / 60000);
  var total12Hr = Math.floor(total12Min / 60);
  var total12RemMin = total12Min % 60;
  document.getElementById('time-total').textContent =
    (total12Hr > 0 ? total12Hr + '시간 ' : '') + total12RemMin + '분';

  // 절약되는 시간 (x11)
  var saved = elapsed * 11;
  var savedMin = Math.floor(saved / 60000);
  var savedHr = Math.floor(savedMin / 60);
  var savedRemMin = savedMin % 60;
  document.getElementById('time-saved').textContent =
    (savedHr > 0 ? savedHr + '시간 ' : '') + savedRemMin + '분';
});
</script>
</body>
</html>
